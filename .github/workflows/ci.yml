name: CI - Build and Basic Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config smartmontools shellcheck

      - name: Build CLI
        run: |
          cd DriveMgr_CLI
          make

      - name: Verify binary exists
        run: |
          if [ ! -f DriveMgr_CLI/DMgr_CLI ]; then
            echo "Build failed: binary not found"
            exit 1
          fi

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: drivemgr-cli
          path: DriveMgr_CLI/DMgr_CLI
