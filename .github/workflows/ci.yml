name: CI - Build and Basic Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config smartmontools shellcheck

      - name: Build CLI
        run: make

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: drivemgr-cli
          path: DMgr_CLI
